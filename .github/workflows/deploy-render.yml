name: Verify Render Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-production
  cancel-in-progress: true

jobs:
  verify:
    name: Build backend and verify Render
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build Render backend
        run: bun run build --prefix server

      - name: Verify production health endpoint
        shell: bash
        run: |
          for attempt in {1..12}; do
            status="$(curl --silent --show-error --output /tmp/maet-health.json --write-out '%{http_code}' --max-time 15 https://maet.onrender.com/api/health || true)"
            if [[ "$status" == "200" ]]; then
              cat /tmp/maet-health.json
              exit 0
            fi
            echo "Render health attempt $attempt returned HTTP $status"
            sleep 10
          done
          echo "Render did not return HTTP 200 within the verification window"
          exit 1
